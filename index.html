*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--border:rgba(0,0,0,.1);
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --accent:#534AB7;--accent-l:#EEEDFE;
  --danger:#E24B4A;--danger-l:#FCEBEB;
  --warn:#EF9F27;--warn-l:#FAEEDA;
  --ok:#1D9E75;--ok-l:#E1F5EE;
  --r:12px;--rs:8px;
  --row-h:68px;
  --color-primary:#534AB7;
  --priority-high:#dc2626;
  --priority-med:#d97706;
  --priority-low:#6b7280;
  --grade-good:#16a34a;
  --grade-ok:#d97706;
  --grade-low:#dc2626;
}
html[data-theme="dark"]{
  --bg:#11131a;--surface:#1a1d27;--border:rgba(255,255,255,.12);
  --text:#f3f4f6;--text2:#c5c8d2;--text3:#8f95a3;
  --accent:#8f87ff;--accent-l:#25224f;
  --danger:#ff7777;--danger-l:#3a1b20;
  --warn:#ffbd5c;--warn-l:#3a2b16;
  --ok:#46d19f;--ok-l:#163529;
  --color-primary:#8f87ff;
  --priority-high:#f87171;
  --priority-med:#fbbf24;
  --priority-low:#9ca3af;
  --grade-good:#4ade80;
  --grade-ok:#fbbf24;
  --grade-low:#f87171;
}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px}
.chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:999px;font-weight:600;margin-inline-start:6px;color:#fff}
.chip--neutral{background:#6b7280}
.chip--grade-good{background:var(--grade-good)}
.chip--grade-ok{background:var(--grade-ok)}
.chip--grade-low{background:var(--grade-low)}
.chip--prio-high{background:var(--priority-high)}
.chip--prio-med{background:var(--priority-med)}
.chip--prio-low{background:var(--priority-low)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.lang-toggle,.theme-toggle{background:var(--accent-l);color:var(--accent);border:1px solid var(--accent);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;min-height:32px}
.theme-toggle{display:inline-flex;align-items:center;gap:6px}
select.lang-toggle{appearance:auto;max-width:190px}
.btn-chat{position:fixed;inset-inline-start:1.25rem;inset-block-end:5rem;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:90;box-shadow:0 4px 16px rgba(83,74,183,.4)}
.fab{inset-inline-end:1.25rem !important;inset-block-end:5rem !important;inset-inline-start:auto !important;left:auto !important;right:auto !important;bottom:auto !important}
.sched-hint{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--accent-l);color:var(--accent);border:1px solid var(--accent);border-radius:var(--rs);padding:8px 12px;margin-bottom:10px;font-size:13px}
.sched-hint button{background:transparent;border:none;color:var(--accent);font-size:18px;cursor:pointer;padding:0 4px}
.fab-menu-disabled{opacity:.45;pointer-events:none;position:relative}
.empty-card{text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px 20px;margin:24px auto;max-width:460px}
.empty-card h3{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text)}
.empty-card p{color:var(--text2);font-size:14px;margin-bottom:18px;line-height:1.6}
.chat-panel{position:fixed;background:var(--surface);z-index:250;display:flex;flex-direction:column;box-shadow:0 -8px 32px rgba(0,0,0,.18)}
@media(max-width:767px){.chat-panel{inset-inline:0;inset-block-end:0;height:80vh;border-radius:20px 20px 0 0}}
@media(min-width:768px){.chat-panel{inset-inline-start:0;inset-block:0;width:400px;height:100vh}}
.chat-panel.hidden{display:none}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);gap:8px}
.chat-header h3{font-size:15px;font-weight:600}
.chat-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:85%;padding:10px 12px;border-radius:14px;font-size:14px;line-height:1.5;word-wrap:break-word}
.chat-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-end-end-radius:4px}
.chat-msg.bot{align-self:flex-start;background:var(--bg);border:1px solid var(--border);border-end-start-radius:4px}
.chat-msg.bot .markdown-body p{margin:4px 0}
.chat-msg.bot .markdown-body code{background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px;font-size:12px}
.chat-msg.bot .markdown-body ul,.chat-msg.bot .markdown-body ol{padding-inline-start:20px;margin:6px 0}
.chat-typing{display:inline-flex;gap:4px;align-items:center}
.chat-typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:tdot 1.2s infinite}
.chat-typing span:nth-child(2){animation-delay:.15s}.chat-typing span:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border)}
.chat-input-row input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text)}
.chat-warn{background:var(--warn-l);color:#854F0B;font-size:12px;padding:8px 12px;border-bottom:1px solid #fac775}
.chat-error{background:var(--danger-l);color:var(--danger);font-size:13px;padding:10px 12px;text-align:center}
.gemini-key-row{display:flex;gap:6px;align-items:center}
.gemini-key-row input{flex:1}
[dir="ltr"] .topbar-title,[dir="ltr"] .day-name,[dir="ltr"] .sname,[dir="ltr"] .modal-title,[dir="ltr"] .fl,[dir="ltr"] .slabel,[dir="ltr"] .empty-card,[dir="ltr"] .card-title,[dir="ltr"] .stat-label,[dir="ltr"] .tname,[dir="ltr"] .tmeta,[dir="ltr"] .empty,[dir="ltr"] .muted,[dir="ltr"] .chat-msg,[dir="ltr"] .alert,[dir="ltr"] .toast,[dir="ltr"] .fi,[dir="ltr"] .fsel{direction:ltr;text-align:start}

html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;-webkit-tap-highlight-color:transparent}
.shell{max-width:1320px;margin:0 auto;padding-bottom:92px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:17px;font-weight:600}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:1320px;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 12px;z-index:100;backdrop-filter:blur(10px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px;border:none;background:none;color:var(--text3);font-size:10px;transition:color .15s;font-family:inherit}
.ni.active{color:var(--accent)}
.ni svg{width:22px;height:22px}
.page{display:none;padding:18px;opacity:0;transform:translateY(6px)}
.page.active{display:block;animation:pageIn .15s ease forwards}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px;text-align:center}
.stat-val{font-size:26px;font-weight:700;color:var(--text)}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.alert{border-radius:var(--rs);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;font-size:13px}
.al-d{background:var(--danger-l);color:#7a1212;border:1px solid #f7c1c1}
.al-w{background:var(--warn-l);color:#6b3a0a;border:1px solid #fac775}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.today-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.today-item:last-child{border-bottom:none}
.tcolor{width:4px;height:44px;border-radius:2px;flex-shrink:0}
.tinfo{flex:1;min-width:0}
.tname{font-size:14px;font-weight:500}
.tmeta{font-size:12px;color:var(--text2);margin-top:2px}
.ttime{font-size:12px;color:var(--text3);direction:ltr;text-align:left;white-space:nowrap}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.bd{background:var(--danger-l);color:var(--danger)}
.bw{background:var(--warn-l);color:#b45309}
.bs{background:var(--ok-l);color:var(--ok)}
.bp{background:var(--accent-l);color:var(--accent)}
.week-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
.wbtn{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:11px 22px;cursor:pointer;font-size:16px;color:var(--text);font-family:inherit}
.wlabel{font-size:18px;font-weight:700;text-align:center;flex:1;line-height:1.55}
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:10px}
.sched-board{display:grid;grid-template-columns:84px repeat(7,minmax(165px,1fr));gap:12px;min-width:1280px;align-items:start}
.sched-head-spacer{height:112px}
.day-head{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 12px 10px;min-height:112px}
.day-head.tod{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent) inset}
.day-name{font-size:16px;font-weight:800;text-align:center;color:var(--text)}
.day-date{font-size:14px;color:var(--text2);text-align:center;margin-top:5px;line-height:1.5}
.date-g{color:var(--text2)}
.date-h{color:var(--accent);font-weight:600;margin-top:2px}
.day-pills{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:8px;min-height:22px}
.day-pill{font-size:12px;padding:4px 10px;border-radius:999px;line-height:1.4;max-width:145px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-pill.assign{background:var(--warn-l);color:#854F0B;border:1px solid #fac775}
.time-col{position:relative;height:calc(var(--row-h) * 12);margin-top:4px}
.time-line{position:absolute;left:0;right:0;height:1px;background:#d8d8dd}
.tlabel{position:absolute;right:0;transform:translateY(-50%);font-size:14px;color:var(--text2);direction:ltr;padding-inline-end:9px;font-weight:700;white-space:nowrap}
.day-track{position:relative;height:calc(var(--row-h) * 12);border:1px solid var(--border);border-radius:14px;background:
  repeating-linear-gradient(to bottom, transparent 0, transparent calc(var(--row-h) - 1px), rgba(0,0,0,.095) calc(var(--row-h) - 1px), rgba(0,0,0,.095) var(--row-h)),
  linear-gradient(180deg,#fff,#fbfbfc);overflow:hidden}
.day-track.tod{box-shadow:0 0 0 1.5px var(--accent) inset}
.sblock{position:absolute;left:10px;right:10px;border-radius:12px;padding:9px 10px;font-size:14px;line-height:1.4;overflow:hidden;font-weight:700}
.sblock.class{border:1px solid transparent;color:#111}
.sblock.exam{background:#FCEBEB;color:#A32D2D;border:1px solid #f3b6b6;z-index:3}
.sblock.study{background:rgba(83,74,183,.06);color:var(--accent);border:1.5px dashed var(--accent);z-index:2}
.sblock.break{background:#f4f4f5;color:#52525b;border:1px solid #d4d4d8;z-index:2}
.sblock-time{font-size:12px;opacity:.92;margin-top:5px;direction:ltr;text-align:left;font-weight:600}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
.sec-title{font-size:16px;font-weight:600}
.add-btn{background:var(--accent-l);color:var(--accent);border:none;border-radius:var(--rs);padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.empty{text-align:center;padding:36px 16px;color:var(--text3);font-size:14px}
.empty-icon{font-size:38px;margin-bottom:8px}
.subj-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.subj-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.sdot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:4px}
.sinfo{flex:1;min-width:0}
.sname{font-size:15px;font-weight:600}
.sgrade{font-size:12px;color:var(--text2);margin-top:2px}
.stars{display:flex;gap:3px;align-items:center}
.star{width:11px;height:11px;border-radius:50%}
.son{background:var(--warn)}
.soff{background:#e5e5e5}
.prog-wrap{height:6px;background:#e5e5e5;border-radius:999px;overflow:hidden;margin-top:6px}
.prog-bar{height:100%;border-radius:999px}
.comp-list{display:grid;gap:8px}
.comp-row{display:grid;grid-template-columns:minmax(70px,1fr) minmax(62px,72px) auto;gap:8px;align-items:center}
.comp-name{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-meter{height:5px;background:#ececec;border-radius:999px;overflow:hidden}
.comp-fill{height:100%;border-radius:999px}
.comp-stack{display:grid;gap:4px}
.comp-input{width:72px;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;text-align:center;background:var(--bg);color:var(--text);font-family:inherit}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:900px;max-height:88vh;overflow-y:auto;animation:sU .2s ease;position:relative}
.modal::before{content:'';display:block;width:44px;height:5px;border-radius:999px;background:#d8d8d8;margin:0 auto 14px}
@keyframes sU{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.mcls{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);padding:4px;line-height:1}
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:500;margin-bottom:6px;display:block;color:var(--text2)}
.fi,.fsel{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:14px;color:var(--text);background:var(--bg);direction:rtl;font-family:inherit}
.date-help{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.4}
.fi:focus,.fsel:focus,.comp-input:focus,.ti:focus{outline:none;border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:11px 20px;border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s,transform .12s}
.btn:hover{opacity:.88}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-d{background:var(--danger-l);color:var(--danger)}
.btn-f{width:100%}
.btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.fab{position:fixed;bottom:76px;left:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:90;box-shadow:0 4px 16px rgba(83,74,183,.4);transition:transform .15s}
.fab:hover{transform:scale(1.05)}
.fab:active{transform:scale(.95)}
.cgrid{display:flex;gap:8px;flex-wrap:wrap}
.copt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s}
.copt:hover{transform:scale(1.15)}
.copt.sel{border-color:var(--text)}
.gc-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.gc-row:last-child{border-bottom:none}
.mini{width:54px;padding:5px 6px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:center;background:var(--bg);color:var(--text)}
.days-grid{display:flex;gap:5px;flex-wrap:wrap}
.dchip{padding:5px 9px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);transition:all .15s}
.dchip.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.srow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);gap:10px}
.srow:last-child{border-bottom:none}
.slabel{font-size:14px}
.ti{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);direction:ltr;font-family:inherit}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;line-height:1}
.del-btn:hover{color:var(--danger)}
.ci{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;gap:10px}
.ci:last-child{border-bottom:none}
.kv{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.kv:last-child{border-bottom:none}
.gpa-card{background:linear-gradient(135deg,var(--accent) 0%,#6b61d8 100%);color:#fff;border:none}
.gpa-grid{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.gpa-val{font-size:30px;font-weight:800}
.gpa-sub{font-size:12px;opacity:.85}
.inline-actions{display:flex;gap:8px;flex-wrap:wrap}
.muted{color:var(--text3);font-size:12px}
.toast-wrap{position:fixed;left:0;right:0;bottom:94px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:300;pointer-events:none;padding:0 16px}
.toast{min-width:220px;max-width:520px;background:var(--surface);border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.12);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;transform:translateY(14px);opacity:0;animation:toastIn .18s ease forwards}
.toast.danger{border-color:#f2b7b7;background:var(--danger-l);color:#7a1212}
.toast.info{border-color:#d6d4fb;background:var(--accent-l);color:var(--accent)}
.toast.ok{border-color:#c6eadc;background:var(--ok-l);color:var(--ok)}
.toast.hide{animation:toastOut .18s ease forwards}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:currentColor}
@keyframes toastIn{to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(14px)}}
input[type=file]{display:none}
@media(max-width:640px){
  .frow,.comp-row{grid-template-columns:1fr}
  .comp-input{width:100%}
  .srow,.kv{align-items:flex-start;flex-direction:column}
}
@media(max-width:500px){
  .btn:active,.subj-card:active,.add-btn:active,.wbtn:active{transform:scale(.97)}
}
html[data-theme="dark"] body{background:var(--bg);color:var(--text)}
html[data-theme="dark"] .topbar,html[data-theme="dark"] .bnav{background:rgba(26,29,39,.92);backdrop-filter:blur(12px)}
html[data-theme="dark"] .card,html[data-theme="dark"] .stat,html[data-theme="dark"] .subj-card,html[data-theme="dark"] .empty-card,html[data-theme="dark"] .modal,html[data-theme="dark"] .chat-panel{box-shadow:0 10px 28px rgba(0,0,0,.22)}
html[data-theme="dark"] .day-track{background:repeating-linear-gradient(to bottom, transparent 0, transparent calc(var(--row-h) - 1px), rgba(255,255,255,.08) calc(var(--row-h) - 1px), rgba(255,255,255,.08) var(--row-h)),linear-gradient(180deg,#1a1d27,#151821)}
html[data-theme="dark"] .time-line{background:rgba(255,255,255,.12)}
html[data-theme="dark"] .sblock.class{color:#f9fafb}
html[data-theme="dark"] .sblock.study{background:rgba(143,135,255,.12)}
html[data-theme="dark"] .sblock.break{background:#252936;color:#d1d5db;border-color:#3f4658}
html[data-theme="dark"] .son{background:var(--warn)}
html[data-theme="dark"] .soff,html[data-theme="dark"] .prog-wrap,html[data-theme="dark"] .comp-meter{background:#303442}
html[data-theme="dark"] .modal-ov{background:rgba(0,0,0,.68)}
html[data-theme="dark"] .chat-msg.bot .markdown-body code{background:rgba(255,255,255,.08)}

</style>

<body>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>

<!-- FAB Modal -->

<!-- Subject Detail -->
<div class="modal-ov" id="m-detail">
  <div class="modal">
    <div class="modal-title"><span id="det-title"></span><button class="mcls" onclick="cm('m-detail')"></button></div>
    <div id="det-body"></div>
  </div>
</div>

<!-- Add Class -->
<div class="modal-ov" id="m-class">
  <div class="modal">
    <div class="modal-title">إضافة حصة <button class="mcls" onclick="cm('m-class')"></button></div>

</div>

<!-- Add Assignment -->
<div class="modal-ov" id="m-assign">

    <div class="modal-title">إضافة واجب <button class="mcls" onclick="cm('m-assign')"></button></div>
    <div class="fg"><label class="fl">المادة</label><select class="fsel" id="as-subj"></select></div>

<!-- Add Commitment -->

    <div class="modal-title">إضافة التزام يومي <button class="mcls" onclick="cm('m-commit')"></button></div>

      <label class="fl">النوع</label>

      <div class="fg"><label class="fl">إلى</label><input type="time" class="fi ti" id="co-end" value="06:00"></div>
    </div>
    <div class="btn-row"><button class="btn btn-p btn-f" onclick="saveCommitment()">حفظ</button></div>
  </div>
</div>

<script>
const SK='study_planner_v2';
const NOTIFY_KEY='notified_v1';
const COLORS=['#534AB7','#0F6E56','#D85A30','#D4537E','#185FA5','#639922','#BA7517','#A32D2D','#888780'];
const CLIGHTS=['#EEEDFE','#E1F5EE','#FAECE7','#FBEAF0','#E6F1FB','#EAF3DE','#FAEEDA','#FCEBEB','#F1EFE8'];
const DAYS_AR=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const DAYS_S=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
const PAGE_TITLES={dashboard:'لوحة التحكم',schedule:'الجدول الأسبوعي',subjects:'المواد الدراسية',settings:'الإعدادات'};
const DAY_START_HOUR=8;
const DAY_END_HOUR=20;
const ROW_H=68;
const DAY_HEIGHT=(DAY_END_HOUR-DAY_START_HOUR)*ROW_H;
const DEFAULT_SUBJECT_COMPS=()=>[
  {id:uid(),name:'حضور',max:10,earned:''},
  {id:uid(),name:'اختبار',max:60,earned:''},
  {id:uid(),name:'واجبات',max:30,earned:''}
];
const DEFAULTS={
  subjects:[],
  classes:[],
  assignments:[],
  exams:[],
  commitments:[],
  aiSchedule:[],
  settings:{sleepStart:'23:00',sleepEnd:'06:00',focusStart:'15:00',focusEnd:'16:00',semesterStart:'',semesterEnd:'',holidays:[]}
};
let D=normalizeData(DEFAULTS);
let editSubjId=null,selColor=COLORS[0],selDiff=3,gComps=[],clDays=[],coDays=[],curPage='dashboard',weekOff=0,swReg=null;

function uid(){return Math.random().toString(36).slice(2,11)}
function t2m(t){if(!t||typeof t!=='string'||!t.includes(':'))return 0;const[h,m]=t.split(':').map(Number);return ((h||0)*60)+((m||0))}
function m2t(m){const total=((Math.round(m)%1440)+1440)%1440;return String(Math.floor(total/60)).padStart(2,'0')+':'+String(total%60).padStart(2,'0')}
function formatHour12(hour){const h=((hour+11)%12)+1;return `${h} ${hour<12?'AM':'PM'}`}
function formatTime12Value(t){const mins=t2m(t);const h=Math.floor(mins/60)%24;const m=mins%60;return `${((h+11)%12)+1}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`}
function formatTimeAr(mins){const date=new Date();date.setHours(0,0,0,0);date.setMinutes(mins);return date.toLocaleTimeString('ar-SA',{hour:'numeric',minute:'2-digit'})}
function parseDateOnly(str){if(!str||typeof str!=='string')return null;const parts=str.split('-').map(Number);if(parts.length!==3||parts.some(Number.isNaN))return null;return new Date(parts[0],parts[1]-1,parts[2])}
function fmtDateInput(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
const GREG_LOCALE='ar-SA-u-ca-gregory';
const HIJRI_LOCALE='ar-SA-u-ca-islamic-umalqura';
const DATE_HINT='مثال ميلادي: 2026-05-04 أو هجري: 1447-11-17';
function fmtGregorian(d,opts){return d.toLocaleDateString(GREG_LOCALE,opts)}
function fmtHijri(d,opts){return d.toLocaleDateString(HIJRI_LOCALE,opts)}
function fmtDualDate(d,opts={month:'short',day:'numeric'}){return `${fmtGregorian(d,opts)} / ${fmtHijri(d,opts)}`}
function fmtDualDateFull(d){return `${fmtGregorian(d,{weekday:'long',year:'numeric',month:'long',day:'numeric'})} — ${fmtHijri(d,{year:'numeric',month:'long',day:'numeric'})}`}
function fmtDualDateStack(d){return `<div class="date-g">${esc(fmtGregorian(d,{month:'short',day:'numeric'}))}</div><div class="date-h">${esc(fmtHijri(d,{month:'short',day:'numeric'}))}</div>`}
function normalizeDigits(str){return String(str??'').replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)).replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d))}
function validGregIso(y,m,d){const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return '';return fmtDateInput(dt)}
function hijriParts(dt){const out={};new Intl.DateTimeFormat(HIJRI_LOCALE,{year:'numeric',month:'numeric',day:'numeric'}).formatToParts(dt).forEach(p=>{if(p.type==='year'||p.type==='month'||p.type==='day')out[p.type]=parseInt(normalizeDigits(p.value),10)});return out}
function hijriToGregorianIso(y,m,d){if(!(y>=1200&&y<=1700&&m>=1&&m<=12&&d>=1&&d<=30))return '';const base=new Date(y+579,m-1,d);for(let off=-430;off<=430;off++){const cand=addDays(base,off);const hp=hijriParts(cand);if(hp.year===y&&hp.month===m&&hp.day===d)return fmtDateInput(cand)}return ''}
function parseFlexibleDateInput(value){let s=normalizeDigits(value).trim().toLowerCase();if(!s)return '';let forced='';if(/^(h|hijri|هجري|هـ)\s*[:\-]?\s*/.test(s)){forced='h';s=s.replace(/^(h|hijri|هجري|هـ)\s*[:\-]?\s*/,'')}else if(/^(g|gregorian|ميلادي|م)\s*[:\-]?\s*/.test(s)){forced='g';s=s.replace(/^(g|gregorian|ميلادي|م)\s*[:\-]?\s*/,'')}const m=s.match(/^(\d{1,4})[\/\-.](\d{1,2})[\/\-.](\d{1,4})$/);if(!m)return '';let a=parseInt(m[1],10),b=parseInt(m[2],10),c=parseInt(m[3],10),y,mo,da;if(String(m[1]).length===4){y=a;mo=b;da=c}else if(String(m[3]).length===4){y=c;if(a>12){da=a;mo=b}else if(b>12){mo=a;da=b}else{mo=a;da=b}}else{return ''}if(forced==='h'||(!forced&&y>=1200&&y<=1700))return hijriToGregorianIso(y,mo,da);return validGregIso(y,mo,da)}
function displayDateInputValue(iso){return iso||''}
function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d}
function sameDay(a,b){return startOfDay(a).getTime()===startOfDay(b).getTime()}
function diffDays(from,to){return Math.round((startOfDay(to)-startOfDay(from))/86400000)}
function clamp(v,min,max){return Math.min(max,Math.max(min,v))}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function slugNum(v){const n=parseFloat(v);return Number.isFinite(n)?n:''}
function loadNotified(){try{return JSON.parse(localStorage.getItem(NOTIFY_KEY)||'{}')}catch(e){return {}}}
function saveNotified(map){localStorage.setItem(NOTIFY_KEY,JSON.stringify(map||{}))}
function normalizeData(input){
  const src=input&&typeof input==='object'?input:{};
  return {
    subjects:Array.isArray(src.subjects)?src.subjects.map(normalizeSubject).filter(Boolean):[],
    classes:Array.isArray(src.classes)?src.classes.map(normalizeClass).filter(Boolean):[],
    assignments:Array.isArray(src.assignments)?src.assignments.map(normalizeAssignment).filter(Boolean):[],
    exams:Array.isArray(src.exams)?src.exams.map(normalizeExam).filter(Boolean):[],
    commitments:Array.isArray(src.commitments)?src.commitments.map(normalizeCommitment).filter(Boolean):[],
    aiSchedule:Array.isArray(src.aiSchedule)?src.aiSchedule.map(normalizeAiScheduleItem).filter(Boolean):[],
    settings:{...DEFAULTS.settings,...(src.settings&&typeof src.settings==='object'?src.settings:{})}
  };
}
function normalizeSubject(s){
  if(!s||typeof s!=='object')return null;
  const comps=Array.isArray(s.gradeComponents)?s.gradeComponents.map(c=>({
    id:c&&c.id?String(c.id):uid(),

function calcGrade(s){
  if(!s||!Array.isArray(s.gradeComponents)||!s.gradeComponents.length)return null;
  let earned=0,total=0,hasAny=false;
  s.gradeComponents.forEach(c=>{
    const max=parseFloat(c.max)||0;
    const val=(c.earned!==''&&c.earned!==null&&c.earned!==undefined)?parseFloat(c.earned):NaN;
    total+=max;
    if(Number.isFinite(val)){earned+=val;hasAny=true}
  });
  if(!hasAny||!total)return null;
  return clamp((earned/total)*100,0,100);
}

function normalizeIntervals(intervals){
  const clean=intervals.filter(i=>Number.isFinite(i.start)&&Number.isFinite(i.end)&&i.end>i.start).sort((a,b)=>a.start-b.start);
  const out=[];
  clean.forEach(it=>{
    if(!out.length||it.start>out[out.length-1].end)out.push({...it});
    else out[out.length-1].end=Math.max(out[out.length-1].end,it.end);
  });
  return out;
}
function clipInterval(start,end,windowStart,windowEnd){
  const s=Math.max(start,windowStart),e=Math.min(end,windowEnd);
  return e>s?{start:s,end:e}:null;
}
function getBusyIntervals(date){
  const day=date.getDay();
  const windowStart=t2m(D.settings.sleepEnd||'06:00');
  let windowEnd=t2m(D.settings.sleepStart||'23:00');
  if(windowEnd<=windowStart)windowEnd+=1440;
  const base=[];
  [...D.classes,...D.commitments].forEach(item=>{
    if(!item.days||!item.days.includes(day))return;
    let start=t2m(item.startTime||'00:00');
    let end=t2m(item.endTime||'00:00');
    if(end<=start)end+=1440;
    const direct=clipInterval(start,end,windowStart,windowEnd); if(direct)base.push(direct);
    const shifted=clipInterval(start+1440,end+1440,windowStart,windowEnd); if(shifted)base.push(shifted);
    const shiftedBack=clipInterval(start-1440,end-1440,windowStart,windowEnd); if(shiftedBack)base.push(shiftedBack);
  });
  return normalizeIntervals(base);
}
function getFreeSlots(date){
  const windowStart=t2m(D.settings.sleepEnd||'06:00');
  let windowEnd=t2m(D.settings.sleepStart||'23:00');
  if(windowEnd<=windowStart)windowEnd+=1440;
  const busy=getBusyIntervals(date);
  const free=[];
  let cursor=windowStart;
  busy.forEach(b=>{
    if(b.start>cursor)free.push({start:cursor,end:b.start});
    cursor=Math.max(cursor,b.end);
  });
  if(cursor<windowEnd)free.push({start:cursor,end:windowEnd});
  return free.filter(s=>s.end-s.start>0);
}
function splitSlotsAt(slots,boundaries){
  const pts=[...new Set(boundaries.filter(Number.isFinite))].sort((a,b)=>a-b);
  const out=[];
  slots.forEach(slot=>{
    let parts=[{...slot}];
    pts.forEach(p=>{
      parts=parts.flatMap(part=>p>part.start&&p<part.end?[{start:part.start,end:p},{start:p,end:part.end}]:[part]);
    });
    out.push(...parts);
  });
  return out.filter(s=>s.end>s.start).sort((a,b)=>a.start-b.start);
}
function totalMinutes(slots){return slots.reduce((a,s)=>a+(s.end-s.start),0)}
function consumeFromSlots(slots,need,preferWindow){
  let remaining=need;
  const blocks=[];
  const focus=preferWindow?slots.filter(s=>s.start>=preferWindow.start&&s.end<=preferWindow.end):[];
  const normal=slots.filter(s=>!(preferWindow&&s.start>=preferWindow.start&&s.end<=preferWindow.end));
  const ordered=preferWindow?[...focus,...normal]:[...slots].sort((a,b)=>a.start-b.start);
  ordered.forEach(seg=>{
    if(remaining<=0)return;
    const src=slots.find(s=>s===seg) || slots.find(s=>s.start===seg.start&&s.end===seg.end);
    if(!src)return;
    const available=src.end-src.start;
    if(available<=0)return;
    const take=Math.min(remaining,available);
    blocks.push({start:src.start,end:src.start+take});
    src.start+=take;
    remaining-=take;
  });
  const kept=slots.filter(s=>s.end-s.start>0).sort((a,b)=>a.start-b.start);
  slots.length=0;kept.forEach(s=>slots.push(s));
  return {blocks,used:need-remaining};
}
function deadlineMetaForSubject(subj,today){
  const deadlines=[];
  D.assignments.forEach(a=>{if(a.subjectId!==subj.id)return;const d=parseDateOnly(a.due);if(!d||d<today)return;deadlines.push({d,title:a.title,type:'واجب'})});
  D.exams.forEach(e=>{if(e.subjectId!==subj.id)return;const d=parseDateOnly(e.date);if(!d||d<today)return;deadlines.push({d,title:'اختبار',type:'اختبار'})});
  deadlines.sort((a,b)=>a.d-b.d);
  if(!deadlines.length)return null;
  const next=deadlines[0];
  const dl=diffDays(today,next.d);
  if(dl>14)return null;
  let mins=(subj.difficulty||3)*20;
  let mult=1;
  if(dl<=1)mult=3;else if(dl<=3)mult=2;else if(dl<=7)mult=1.5;
  mins=Math.round(clamp(mins*mult,30,120));
  return {dl,mins,reason:`${next.type}: ${next.title}`,score:(subj.difficulty||3)*mult,next};
}
function studyPlan(date){
  const today=startOfDay(date);
  const freeSlotsBase=getFreeSlots(today);
  if(totalMinutes(freeSlotsBase)<30)return [];
  const focusStart=t2m(D.settings.focusStart||'15:00');
  let focusEnd=t2m(D.settings.focusEnd||'16:00');
  if(focusEnd<=focusStart)focusEnd=focusStart+60;
  const slots=splitSlotsAt(freeSlotsBase.map(s=>({...s})),[focusStart,focusEnd]);
  const subjects=D.subjects.map(subj=>({subj,meta:deadlineMetaForSubject(subj,today)})).filter(x=>x.meta).sort((a,b)=>{
    if(a.meta.dl!==b.meta.dl)return a.meta.dl-b.meta.dl;
    if((b.subj.difficulty||0)!==(a.subj.difficulty||0))return (b.subj.difficulty||0)-(a.subj.difficulty||0);
    return (b.meta.score||0)-(a.meta.score||0);
  });
  const plan=[];
  subjects.forEach((item,index)=>{
    const snapshot=slots.map(s=>({...s}));
    const pref=index===0?{start:focusStart,end:focusEnd}:null;
    const result=consumeFromSlots(slots,item.meta.mins,pref);
    if(result.used<30){slots.length=0;snapshot.forEach(s=>slots.push(s));return;}
    const blocks=result.blocks.map(b=>({start:b.start,end:b.end,startLabel:formatTimeAr(b.start)}));
    plan.push({
      ...item.subj,
      dl:item.meta.dl,
      mins:result.used,
      requestedMins:item.meta.mins,
      reason:item.meta.reason,
      startMin:blocks[0].start,
      startLabel:blocks[0].startLabel,
      blocks
    });
  });
  return plan;
}

  D.classes.filter(c=>c.days&&c.days.includes(day)).forEach(c=>{
    const s=subjById(c.subjectId);if(!s)return;
    const start=t2m(c.startTime),end=t2m(c.endTime);if(end<=start)return;
    const top=timeToTrackPos(clamp(start,DAY_START_HOUR*60,DAY_END_HOUR*60));
    const bottom=timeToTrackPos(clamp(end,DAY_START_HOUR*60,DAY_END_HOUR*60));
    if(bottom<=0||top>=DAY_HEIGHT)return;
    blocks.push({type:'class',top:Math.max(0,top),height:Math.max(40,Math.min(DAY_HEIGHT,bottom)-Math.max(0,top)),title:s.nameAr,sub:`${formatTime12Value(c.startTime)} - ${formatTime12Value(c.endTime)}${c.room?' · '+c.room:''}`,color:s.color,bg:getSubjectLight(s.color)});
  });
  dayExams(date).forEach(e=>{
    const s=subjById(e.subjectId);const start=t2m(e.time||'08:00');
    const end=start+60;
    const top=timeToTrackPos(clamp(start,DAY_START_HOUR*60,DAY_END_HOUR*60));
    const bottom=timeToTrackPos(clamp(end,DAY_START_HOUR*60,DAY_END_HOUR*60));
    blocks.push({type:'exam',top:Math.max(0,top),height:Math.max(44,Math.min(DAY_HEIGHT,bottom)-Math.max(0,top)),title:`${s?s.nameAr:'اختبار'} `,sub:`${formatTimeAr(start)}${e.room?' · '+e.room:''}`});
  });
  const aiItems=aiItemsForDate(date);
  aiItems.forEach(item=>{
    const parts=aiTimeParts(item);
    const top=timeToTrackPos(clamp(parts.startMin,DAY_START_HOUR*60,DAY_END_HOUR*60));
    const bottom=timeToTrackPos(clamp(parts.endMin,DAY_START_HOUR*60,DAY_END_HOUR*60));
    if(bottom<=0||top>=DAY_HEIGHT)return;
    blocks.push({type:item.type,top:Math.max(0,top),height:Math.max(40,Math.min(DAY_HEIGHT,bottom)-Math.max(0,top)),title:item.type==='break'?'Break':`AI: ${item.subject}`,sub:parts.label});
  });
  if(!aiItems.length)studyPlan(date).forEach(p=>{
    p.blocks.forEach((b,idx)=>{
      const top=timeToTrackPos(clamp(b.start,DAY_START_HOUR*60,DAY_END_HOUR*60));
      const bottom=timeToTrackPos(clamp(b.end,DAY_START_HOUR*60,DAY_END_HOUR*60));
      if(bottom<=0||top>=DAY_HEIGHT)return;
      blocks.push({type:'study',top:Math.max(0,top),height:Math.max(40,Math.min(DAY_HEIGHT,bottom)-Math.max(0,top)),title:idx===0?`مذاكرة ${p.nameAr}`:p.nameAr,sub:`${b.startLabel} · ${b.end-b.start} دق`});
    });
  });
  return blocks.sort((a,b)=>a.top-b.top||b.height-a.height);
}
function renderSched(){
  const pg=document.getElementById('pg-schedule');
  const today=startOfDay(new Date());
  const weekStart=addDays(today,-today.getDay()+weekOff*7);
  const weekEnd=addDays(weekStart,6);
  const fmt=d=>fmtDualDate(d,{month:'short',day:'numeric'});
  let h=`<div class="week-hdr">
    <button class="wbtn" onclick="wk(-1)">→</button>
    <div class="wlabel">${fmt(weekStart)} — ${fmt(weekEnd)}</div>
    <button class="wbtn" onclick="wk(1)">←</button>
  </div>
  <div class="card" style="padding:12px;margin-bottom:12px">
    <div class="kv">
      <div><div style="font-weight:600">AI Study Schedule</div><div class="muted">${(D.aiSchedule||[]).length?`${D.aiSchedule.length} saved items`:'Generate an optimized plan using your Netlify OpenAI API'}</div></div>
      <div class="inline-actions"><button class="btn btn-p" onclick="generateAiSchedule()">Generate AI schedule</button><button class="btn btn-s" onclick="clearAiSchedule()">Clear AI</button></div>
    </div>
  </div>
  <div class="cal-wrap"><div class="sched-board">`;
  h+='<div class="sched-head-spacer"></div>';
  for(let d=0;d<7;d++){
    const dt=addDays(weekStart,d);
    const isTod=sameDay(dt,new Date());
    const pills=dayAssignments(dt).map(a=>`<span class="day-pill assign" title="${esc(a.title)}"> ${esc(a.title)}</span>`).join('');
    h+=`<div class="day-head ${isTod?'tod':''}"><div class="day-name">${DAYS_S[d]}</div><div class="day-date">${fmtDualDateStack(dt)}</div><div class="day-pills">${pills}</div></div>`;
  }
  h+='<div class="time-col">';
  for(let hr=DAY_START_HOUR;hr<=DAY_END_HOUR;hr++){
    const top=(hr-DAY_START_HOUR)*ROW_H;
    h+=`<div class="time-line" style="top:${top}px"></div><div class="tlabel" style="top:${top}px">${formatHour12(hr)}</div>`;
  }
  h+='</div>';
  for(let d=0;d<7;d++){
    const dt=addDays(weekStart,d);const isTod=sameDay(dt,new Date());
    const blocks=buildDayBlocks(dt);
    h+=`<div class="day-track ${isTod?'tod':''}">`;
    blocks.forEach(b=>{
      const style=b.type==='class'?`top:${b.top}px;height:${b.height}px;background:${b.bg};border-color:${b.color}55;color:${b.color}`:`top:${b.top}px;height:${b.height}px`;
      h+=`<div class="sblock ${b.type}" style="${style}" title="${esc(b.title)}"><div>${esc(b.title)}</div><div class="sblock-time">${esc(b.sub||'')}</div></div>`;
    });
    h+='</div>';
  }
  h+='</div></div>';
  const up=getUpcoming(14);
  if(up.length>0){
    h+=`<div class="card" style="margin-top:12px"><div class="card-title">المواعيد القادمة</div>`;
    up.slice(0,8).forEach(u=>{
      const urg=u.dl<=2?'d':u.dl<=5?'w':'s';
      const baseDate=u.type==='assign'?u.due:u.date;
      const dateObj=parseDateOnly(baseDate);
      const dateStr=dateObj?fmtDualDate(dateObj,{weekday:'short',month:'short',day:'numeric'}):'—';
      h+=`<div class="today-item"><div style="flex:1"><div class="tname">${esc(u.sn)} — ${esc(u.title)}</div><div class="tmeta">${dateStr}</div></div><span class="badge b${urg}">${u.dl} ${u.dl===1?'يوم':'أيام'}</span></div>`;
    });
    h+='</div>';
  }
  pg.innerHTML=h;
}

async function pushNotification(title,body){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  try{
    if(swReg&&swReg.showNotification)await swReg.showNotification(title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="%23534AB7"/><text x="96" y="118" font-size="84" text-anchor="middle" fill="white"></text></svg>'});
    else new Notification(title,{body});
  }catch(e){}
}
async function checkNotifications(){
  const todayStr=fmtDateInput(new Date());
  const map=loadNotified();
  const today=startOfDay(new Date());
  const send=[];
  D.assignments.forEach(a=>{
    const due=parseDateOnly(a.due);if(!due||due<today)return;
    const dl=diffDays(today,due);if(dl!==1)return;
    if(map[a.id]===todayStr)return;
    const s=subjById(a.subjectId);send.push({id:a.id,title:'تذكير واجب',body:`${a.title} لمادة ${s?s.nameAr:'—'} غداً`});
  });
  D.exams.forEach(e=>{
    const d=parseDateOnly(e.date);if(!d||d<today)return;
    const dl=diffDays(today,d);if(dl!==3)return;
    if(map[e.id]===todayStr)return;
    const s=subjById(e.subjectId);send.push({id:e.id,title:'تذكير اختبار',body:`اختبار ${s?s.nameAr:'—'} بعد 3 أيام`});
  });
  for(const item of send){await pushNotification(item.title,item.body);map[item.id]=todayStr}
  saveNotified(map);
}

async function registerInlinePWA(){
  if(!('serviceWorker' in navigator))return;
  const swCode=`
    const CACHE='study-planner-v3';
    self.addEventListener('install',event=>{
      event.waitUntil((async()=>{
        const cache=await caches.open(CACHE);
        const clientsArr=await self.clients.matchAll({includeUncontrolled:true,type:'window'});
        const urls=[...new Set(clientsArr.map(c=>c.url.split('#')[0]).filter(Boolean))];
        await Promise.all(urls.map(u=>cache.add(u).catch(()=>null)));
        await self.skipWaiting();
      })());
    });
    self.addEventListener('activate',event=>event.waitUntil(self.clients.claim()));
    self.addEventListener('fetch',event=>{
      if(event.request.method!=='GET')return;
      event.respondWith((async()=>{
        const cache=await caches.open(CACHE);
        const cached=await cache.match(event.request,{ignoreSearch:false});
        if(cached)return cached;
        try{
          const fresh=await fetch(event.request);
          if(event.request.mode==='navigate'||event.request.destination==='document')cache.put(event.request,fresh.clone()).catch(()=>null);
          return fresh;
        }catch(err){
          const fallback=await cache.match(location.origin+'/') || await cache.match('./');
          if(fallback)return fallback;
          throw err;
        }
      })());
    });`;
  try{
    const blobUrl=URL.createObjectURL(new Blob([swCode],{type:'text/javascript'}));
    swReg=await navigator.serviceWorker.register(blobUrl,{scope:'./'});
  }catch(e){/* silent */}
}

function safeGet(key,fallback){try{const r=localStorage.getItem(key);return r?JSON.parse(r):fallback}catch{return fallback}}
function safeSet(key,value){try{localStorage.setItem(key,JSON.stringify(value))}catch(e){try{toast(t('errors.storageQuota'),'danger')}catch{}}}
function safeGetRaw(key,fallback){try{const r=localStorage.getItem(key);return r==null?fallback:r}catch{return fallback}}

function runMigrations(){
  let v=parseInt(safeGetRaw('study_planner_schema_version','1'),10);
  if(isNaN(v))v=1;
  if(v<2){
    try{
      (D.subjects||[]).forEach(s=>(s.gradeComponents||[]).forEach(c=>{if(!('actualScore'in c))c.actualScore=null}));
      (D.assignments||[]).forEach(a=>{if(!a.priority)a.priority='medium'});
      (D.exams||[]).forEach(e=>{if(!e.priority)e.priority='medium'});
      save();
    }catch{}
    safeSetRaw('study_planner_schema_version','2');
  }
}

  return parts.reduce((o,k)=>o&&o[k],translations.en)??key;
}

    btn.title=currentLang==='ar'?(isDark?'الوضع الفاتح':'الوضع الداكن'):(isDark?'Light mode':'Dark mode');

  }
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.setAttribute('content',isDark?'#11131a':'#534AB7');
}

/* ---- Priority logic ---- */
function priorityScore(item,today){
  const dateStr=item.due||item.date;if(!dateStr)return 0;
  const d=new Date(dateStr);const days=Math.ceil((d-today)/86400000);
  let s=0;if(days<0)s+=100;else s+=Math.max(0,30-days);
  if(item.__type==='exam')s+=15;
  return s;
}
function priorityLabel(score){if(score>=80)return 'high';if(score>=30)return 'medium';return 'low'}

  // Append grade chips next to subject names
  document.querySelectorAll('#pg-subjects .subj-card').forEach((card,i)=>{
    const s=D.subjects[i];if(!s)return;
    const chip=buildGradeChip(s);
    if(!chip)return;
    const nameEl=card.querySelector('.sname');
    if(nameEl&&!nameEl.querySelector('.chip'))nameEl.insertAdjacentHTML('beforeend',chip);
  });
};
function buildGradeChip(s){
  const comps=(s.gradeComponents||[]).filter(c=>{
    const v=c.actualScore!=null?c.actualScore:c.earned;
    return v!==''&&v!=null&&!isNaN(parseFloat(v));
  });
  if(!comps.length)return '';
  const totalComps=(s.gradeComponents||[]).length;
  let earned=0,outOf=0;
  comps.forEach(c=>{
    const max=parseFloat(c.max)||0;
    const v=parseFloat(c.actualScore!=null?c.actualScore:c.earned);
    const w=parseFloat(c.weight)||max||0;
    if(max>0){earned+=(v/max)*w;outOf+=w}
  });
  const fully=comps.length===totalComps&&totalComps>0;
  if(fully&&outOf>0){
    const pct=Math.round((earned/outOf)*100);
    const cls=pct>=85?'chip--grade-good':pct>=60?'chip--grade-ok':'chip--grade-low';
    return ` <span class="chip ${cls}">${pct}%</span>`;
  }
  return ` <span class="chip chip--neutral">${earned.toFixed(1)} / ${outOf.toFixed(0)}</span>`;
}

function exportBackupV3(){

function importBackupV3(json){
  let data;try{data=JSON.parse(json)}catch{toast(t('errors.importInvalidFile'),'danger');return}
  const fileVersion=parseInt(data.appVersion??data.study_planner_schema_version??'1',10);
  if(typeof data!=='object'||!Array.isArray(data.subjects)){toast(t('errors.importInvalidFile'),'danger');return}
  if(!isNaN(fileVersion)&&fileVersion>2){toast(t('errors.importVersionNewer'),'danger');return}
  if(Array.isArray(data.subjects))D.subjects=data.subjects;
  if(Array.isArray(data.classes))D.classes=data.classes;
  if(Array.isArray(data.assignments))D.assignments=data.assignments;
  if(Array.isArray(data.exams))D.exams=data.exams;
  if(Array.isArray(data.commitments))D.commitments=data.commitments;
  if(data.settings&&typeof data.settings==='object')D.settings={...D.settings,...data.settings};
  if(Array.isArray(data.aiSchedule))D.aiSchedule=data.aiSchedule;
  if(data.study_planner_lang){currentLang=data.study_planner_lang;safeSetRaw('study_planner_lang',currentLang)}
  save();runMigrations();applyLangToDocument();rerenderAll();

}

/* ---- Gemini Chat ---- */
const GEMINI_MODEL='gemini-2.0-flash';
let chatSessionMessageCount=0,chatWarningShown=false;
function getChatHistory(){return safeGet('study_planner_chat_history',[])}
function setChatHistory(h){const trimmed=h.slice(-50);safeSet('study_planner_chat_history',trimmed)}
function openChat(){
  const panel=document.getElementById('chat-panel');panel.classList.remove('hidden');
  applyLangToDocument();renderChatBody();
  setTimeout(()=>document.getElementById('chat-input').focus(),50);
}
function closeChat(){document.getElementById('chat-panel').classList.add('hidden')}
function clearChat(){if(!confirm(t('chat.clearConfirm')))return;setChatHistory([]);chatSessionMessageCount=0;chatWarningShown=false;document.getElementById('chat-warn-slot').innerHTML='';renderChatBody()}
function renderChatBody(){
  const body=document.getElementById('chat-body');if(!body)return;
  const hist=getChatHistory();
  body.innerHTML=hist.map(m=>renderChatMessage(m)).join('');
  body.scrollTop=body.scrollHeight;
}
function renderChatMessage(m){
  if(m.role==='user')return `<div class="chat-msg user">${esc(m.text)}</div>`;
  const html=(typeof marked!=='undefined'&&typeof DOMPurify!=='undefined')?DOMPurify.sanitize(marked.parse(m.text||'')):esc(m.text||'');
  return `<div class="chat-msg bot"><div class="markdown-body">${html}</div></div>`;
}
function buildSystemPrompt(){
  const today=new Date();const iso=today.toISOString().split('T')[0];
  const day=today.toLocaleDateString(LANGUAGE_OPTIONS[currentLang]?.locale||'en-US',{weekday:'long'});
  const subjects=D.subjects||[];const assignments=(D.assignments||[]).filter(a=>!a.completed);
  const exams=D.exams||[];const sessions=D.classes||[];
  const subjectNames=subjects.map(s=>currentLang==='ar'?s.nameAr:s.nameEn).join(', ');
  const next14=exams.filter(e=>{const diff=(new Date(e.date)-today)/86400000;return diff>=0&&diff<=14}).map(e=>`${subjectName(e.subjectId)} — ${e.date}`).join('\n');
  const pending=assignments.map(a=>`${a.title} — ${subjectName(a.subjectId)} — ${a.due}`).join('\n');
  const thisWeek=sessions.map(s=>`${subjectName(s.subjectId)} — days ${(s.days||[]).join(',')} — ${s.startTime}`).join('\n');
  return `You are a study assistant embedded in a multilingual study planner app.\nToday: ${iso} (${day}).\nActive language: ${LANGUAGE_OPTIONS[currentLang]?.assistant||currentLang}.\n\nStudent's subjects: ${subjectNames||'none'}.\nUpcoming exams (next 14 days):\n${next14||'none'}\nPending assignments:\n${pending||'none'}\nThis week's sessions:\n${thisWeek||'none'}\n\nHelp the student plan, prioritize, and learn. You can:\n- suggest study schedules based on workload and deadlines\n- recommend what to study first\n- explain study techniques and break down assignments\n- answer general academic questions\n\nRules:\n- Reply in the same language the user wrote in.\n- Be concise, practical, and supportive.\n- Do not invent data not provided above.\n- Do not claim to modify the planner — you can only suggest.`;
}
async function callGemini(userMessage,history){
  const controller=new AbortController();const timeout=setTimeout(()=>controller.abort(),20000);
  try{
    const res=await fetch('/api/chat',{
      method:'POST',signal:controller.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({systemPrompt:buildSystemPrompt(),history,userMessage})
    });
    clearTimeout(timeout);return await handleGeminiResponse(res);
  }catch(err){clearTimeout(timeout);if(err.name==='AbortError')throw new Error('networkError');throw err}
}
async function handleGeminiResponse(res){
  if(!res.ok){
    if(res.status===400)throw new Error('invalidKey');
    if(res.status===401||res.status===403)throw new Error('keyRejected');
    if(res.status===429)throw new Error('rateLimit');
    if(res.status>=500)throw new Error('serviceUnavailable');
    throw new Error('generic');
  }
  const data=await res.json();
  const text=data?.text;
  if(!text)throw new Error('safetyBlock');
  return text;
}
async function sendChat(){
  const input=document.getElementById('chat-input');const txt=input.value.trim();if(!txt)return;
  const hist=getChatHistory();
  hist.push({role:'user',text:txt});setChatHistory(hist);input.value='';
  chatSessionMessageCount++;
  if(chatSessionMessageCount>=20&&!chatWarningShown){
    chatWarningShown=true;
    document.getElementById('chat-warn-slot').innerHTML=`<div class="chat-warn">${esc(t('chat.rateLimitWarning'))}</div>`;
  }
  renderChatBody();
  const body=document.getElementById('chat-body');
  body.insertAdjacentHTML('beforeend',`<div class="chat-msg bot" id="typing-ind"><div class="chat-typing"><span></span><span></span><span></span></div></div>`);
  body.scrollTop=body.scrollHeight;
  try{
    const reply=await callGemini(txt,hist.slice(0,-1));
    document.getElementById('typing-ind')?.remove();
    const h2=getChatHistory();h2.push({role:'bot',text:reply});setChatHistory(h2);
    renderChatBody();
  }catch(err){
    document.getElementById('typing-ind')?.remove();
    const code=err.message;const msg=t('errors.'+code)||t('errors.generic');
    body.insertAdjacentHTML('beforeend',`<div class="chat-error">${esc(msg)}</div>`);
    body.scrollTop=body.scrollHeight;
  }
}

  const dayShort={ar:['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'],en:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],es:['dom','lun','mar','mié','jue','vie','sáb'],'pt-BR':['dom','seg','ter','qua','qui','sex','sáb'],hi:['रवि','सोम','मंगल','बुध','गुरु','शुक्र','शनि']};
  let i=dayFull.ar.indexOf(trimmed);if(i>=0)return raw.replace(trimmed,dayFull[currentLang]?.[i]||dayFull.en[i]);
  i=dayShort.ar.indexOf(trimmed);if(i>=0)return raw.replace(trimmed,dayShort[currentLang]?.[i]||dayShort.en[i]);
  return raw;
}
function localizeDynamicText(txt){
  let out=localizeTextValue(txt);
  if(currentLang==='ar')return out;
  out=out.replace(/(\d+)\s*أيام/g,(m,n)=>`${n} ${ui('days')||t('common.days')}`);
  out=out.replace(/(\d+)\s*دق/g,(m,n)=>`${n} ${ui('minutes')}`);
  out=out.replace(/يبدأ\s*/g,ui('starts')+' ');
  out=out.replace(/غداً|غدًا/g,t('common.tomorrow'));
  out=out.replace(/اليوم/g,t('common.today'));
  out=out.replace(/واجب/g,ui('assignment'));
  out=out.replace(/اختبار/g,ui('exam'));
  out=out.replace(/مذاكرة/g,ui('studyPlan'));
  out=out.replace(/عاجل/g,ui('urgent')).replace(/قريب/g,ui('soon')).replace(/مرن/g,ui('flexible'));
  out=out.replace(/تم حذف المادة/g,currentLang==='hi'?'विषय हटाया गया':currentLang==='es'?'Materia eliminada':currentLang==='pt-BR'?'Matéria excluída':'Subject deleted');
  return out;
}
function localizeAll(root=document){
  try{
    document.title=ui('appTitle')+' | Study Planner';
    document.documentElement.dir=LANGUAGE_OPTIONS[currentLang]?.dir||'ltr';
    document.documentElement.lang=currentLang;
    const walker=document.createTreeWalker(root.body||root,NodeFilter.SHOW_TEXT,{acceptNode(node){
      const p=node.parentElement;
      if(!p||['SCRIPT','STYLE','TEXTAREA'].includes(p.tagName))return NodeFilter.FILTER_REJECT;
      return node.nodeValue.trim()?NodeFilter.FILTER_ACCEPT:NodeFilter.FILTER_REJECT;
    }});
    const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);
    nodes.forEach(n=>{n.nodeValue=localizeDynamicText(n.nodeValue)});
    document.querySelectorAll('input[placeholder],textarea[placeholder]').forEach(el=>{
      const ph=el.getAttribute('placeholder')||'';
      const map={'مثال: تحليل خوارزميات':'placeholderSubjectAr','e.g. Algorithm Analysis':'placeholderSubjectEn','D201':'placeholderRoom','مثال: واجب الفصل الثالث':'placeholderAssignment','2026-05-04 أو 1447-11-17':null,'قاعة A1':'placeholderExamRoom','اسم الالتزام':'placeholderCommit'};
      if(map[ph])el.setAttribute('placeholder',ui(map[ph]));
    });
    document.querySelectorAll('option').forEach(o=>{o.textContent=localizeDynamicText(o.textContent)});
    const themeBtn=document.getElementById('theme-toggle');
    if(themeBtn){themeBtn.title=currentTheme==='dark'?ui('lightMode'):ui('darkMode');themeBtn.setAttribute('aria-label',themeBtn.title)}
  }catch(e){console.warn('localizeAll failed',e)}
}
function localizeModalTitlesAndControls(){localizeAll(document)}
function wrapRenderForI18n(name){
  const original=window[name];
  if(typeof original!=='function'||original.__i18nWrapped)return;
  window[name]=function(...args){const result=original.apply(this,args);localizeAll(document);return result};
  window[name].__i18nWrapped=true;
}
['renderDash','renderSched','renderSubjs','renderSettings','openDetail','openAddClass','openAddAssignment','openAddExam','openAddCommitment','renderChatBody'].forEach(wrapRenderForI18n);
const originalApplyLangToDocument=applyLangToDocument;
applyLangToDocument=function(){originalApplyLangToDocument();localizeAll(document)};
const originalToast=toast;
toast=function(msg,type='info'){originalToast(localizeDynamicText(msg),type)};
const originalConfirm=window.confirm.bind(window);
window.confirm=function(message){return originalConfirm(localizeDynamicText(message))};
const originalAlert=window.alert.bind(window);
window.alert=function(message){return originalAlert(localizeDynamicText(message))};
const originalPrompt=window.prompt.bind(window);
window.prompt=function(message,def){return originalPrompt(localizeDynamicText(message),def)};

/* ---- Init: migrations + lang + theme ---- */
runMigrations();
applyTheme();
applyLangToDocument();
/* ============== END v3 ADDITIONS ============== */

load();
renderDash();
applyLangToDocument();
function runBackgroundStartupTasks(){
  registerInlinePWA()
    .then(()=>requestNotificationsIfNeeded())
    .then(()=>checkNotifications())
    .catch(()=>{});
}
if('requestIdleCallback' in window){
  requestIdleCallback(runBackgroundStartupTasks,{timeout:4000});
}else{
  setTimeout(runBackgroundStartupTasks,2500);
}
